name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"     
  workflow_dispatch:        

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write     

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}  

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=Directinho&show_icons=true&bg_color=0d1117&text_color=ffffff&icon_color=fafafa&title_color=58a6ff&hide_rank=true&hide_border=true
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top-langs card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=Directinho&layout=compact&show_icons=true&bg_color=0d1117&text_color=ffffff&icon_color=fafafa&title_color=58a6ff&langs_count=8&hide_border=true
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit and push cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          
          git add profile/*.svg
          
          if git diff --staged --quiet; then
            echo "No changes to commit"
            exit 0
          fi
          
          git commit -m "Update README cards [skip ci]"
          git push